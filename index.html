<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>와일드 슈터: 웨스트 살롱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div class="stat">스테이지: <span id="stage">1</span></div>
            <div class="stat">점수: <span id="score">0</span></div>
            <div class="stat">남은 시간: <span id="timer">30</span>s</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="msg-overlay" class="hidden">
            <h1 id="msg-text">STAGE CLEAR!</h1>
            <button onclick="nextStage()">다음 스테이지</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
